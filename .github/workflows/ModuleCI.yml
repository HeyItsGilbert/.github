name: CI
on:
  push:
    branches: [ $default-branch ]
  pull_request:
  workflow_dispatch:
  workflow_call:
permissions:
  checks: write
  pull-requests: write
  contents: read
  issues: write
jobs:
  lint:
    name: Run Linters
    runs-on: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: streetsidesoftware/cspell-action@v6
      with:
        strict: false
        suggestions: true
        incremental_files_only: true
    - shell: pwsh
      name: Apply PSScriptAnalyzer Fixes
      run: Invoke-ScriptAnalyzer . -Fix
    - name: PSScriptAnalyzer Fixes
      uses: reviewdog/action-suggester@v1.21.0
      with:
        tool_name: 'PSScriptAnalyzer'
  test_pwsh:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
    - uses: actions/checkout@v4
    - name: Test
      shell: pwsh
      run: ./build.ps1 -Task Test -Bootstrap
    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Unit Test Results (OS ${{ matrix.os }})
        path: ./tests/out/testResults.xml
  test_powershell:
    name: Run Tests (PowerShell 5.1)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Test
      shell: powershell
      run: ./build.ps1 -Task Test -Bootstrap
    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Unit Test Results (OS Windows PowerShell 5.1)
        path: ./tests/out/testResults.xml
  publish-test-results:
    name: "Publish Unit Tests Results"
    needs:
      - test_pwsh
      - test_powershell
    runs-on: ubuntu-latest
    # the test job might be skipped, we don't need to run this job then
    if: success() || failure()

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: artifacts/**/*.xml
